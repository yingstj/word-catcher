<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Catcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --ink: #2A2D43;
    --cream: #FFF8EC;
    --sun: #FFC857;
    --berry: #E84855;
    --leaf: #6BAA75;
    --sky: #A8D8EA;
    --plum: #6A4C93;
    --peach: #FFB5A7;
    --shadow-sm: 0 2px 0 rgba(42, 45, 67, 0.12);
    --shadow-md: 0 6px 0 rgba(42, 45, 67, 0.15), 0 10px 20px rgba(42, 45, 67, 0.08);
    --shadow-lg: 0 10px 0 rgba(42, 45, 67, 0.18), 0 20px 40px rgba(42, 45, 67, 0.15);
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Nunito', system-ui, sans-serif;
  }

  html, body {
    height: 100%; overflow: hidden;
    font-family: var(--font-body);
    user-select: none; -webkit-user-select: none;
    color: var(--ink);
  }

  body {
    transition: background 1.2s ease;
    background: linear-gradient(180deg, #FFE8C2 0%, #FFD89B 50%, #C7E9B0 100%);
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.3) 0%, transparent 50%);
    pointer-events: none;
    z-index: 1;
  }

  body.theme-school    { background: linear-gradient(180deg, #FFE2B0 0%, #FFCB85 50%, #C8E6B5 100%); }
  body.theme-beach     { background: linear-gradient(180deg, #A8D8EA 0%, #C9E4DE 50%, #FFE5A0 100%); }
  body.theme-backyard  { background: linear-gradient(180deg, #B5DDF1 0%, #C9E4DE 50%, #A8D8B9 100%); }
  body.theme-kitchen   { background: linear-gradient(180deg, #FFF1D6 0%, #FFD9B3 60%, #FFC4B0 100%); }
  body.theme-bedroom   { background: linear-gradient(180deg, #C9B6E4 0%, #D9C2EA 50%, #FFD4DD 100%); }
  body.theme-playroom  { background: linear-gradient(180deg, #FFD4B5 0%, #FFE2B0 50%, #FFF1B0 100%); }
  body.theme-playground{ background: linear-gradient(180deg, #A8D8EA 0%, #B5D9A8 60%, #D4E8B0 100%); }
  body.theme-park      { background: linear-gradient(180deg, #B5DDF1 0%, #B5D9A8 50%, #C8E6B5 100%); }

  .cloud {
    position: fixed;
    background: rgba(255, 255, 255, 0.5);
    border-radius: 50%;
    z-index: 2;
    pointer-events: none;
    filter: blur(2px);
  }
  .cloud-1 { width: 180px; height: 60px; top: 15%; left: -10%; animation: drift 60s linear infinite; }
  .cloud-2 { width: 140px; height: 50px; top: 35%; left: -10%; animation: drift 80s linear infinite; animation-delay: -30s; }
  .cloud-3 { width: 200px; height: 70px; top: 60%; left: -10%; animation: drift 70s linear infinite; animation-delay: -15s; }
  @keyframes drift {
    from { transform: translateX(0); }
    to { transform: translateX(calc(100vw + 200px)); }
  }

  #game { position: relative; width: 100%; height: 100vh; overflow: hidden; z-index: 10; }

  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 100;
    padding: 18px 18px 22px;
  }
  .top-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; gap: 10px;
  }

  .stat-pill {
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 999px;
    padding: 8px 16px;
    font-family: var(--font-body);
    font-weight: 800;
    font-size: 18px;
    display: flex; align-items: center; gap: 6px;
    box-shadow: var(--shadow-sm);
    color: var(--ink);
  }
  .stat-pill .icon { font-size: 22px; line-height: 1; }
  .stat-pill .stars-num { color: var(--berry); }
  .stat-pill.theme-pill {
    background: var(--ink);
    color: var(--cream);
    border-color: var(--ink);
    font-family: var(--font-display);
    font-weight: 700;
  }

  .sentence-card {
    background: var(--cream);
    border: 4px solid var(--ink);
    border-radius: 24px;
    padding: 16px 20px;
    box-shadow: var(--shadow-md);
    position: relative;
  }
  .sentence-card::before, .sentence-card::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    background: var(--berry);
    border-radius: 50%;
    top: -6px;
  }
  .sentence-card::before { left: 16px; }
  .sentence-card::after { right: 16px; background: var(--sun); }

  .sentence {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    line-height: 1.35;
    letter-spacing: -0.01em;
  }
  .target-word {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: rgba(255, 200, 87, 0.35);
    border-bottom: 3px solid var(--sun);
    margin: 0 1px;
  }
  .target-word.caught {
    background: var(--leaf);
    color: var(--cream);
    border-bottom-color: var(--leaf);
    text-decoration: line-through;
    text-decoration-thickness: 3px;
  }
  .target-word.flash {
    background: var(--sun);
    transform: scale(1.18) rotate(-2deg);
    box-shadow: 0 6px 0 var(--ink);
  }

  #playArea { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .falling-item {
    position: absolute;
    cursor: pointer;
    will-change: transform;
    font-size: 112px;
    line-height: 1;
    filter:
      drop-shadow(3px 6px 0 rgba(42, 45, 67, 0.18))
      drop-shadow(0 8px 16px rgba(42, 45, 67, 0.15));
    transition: transform 0.1s ease;
    animation: gentleWobble 3s ease-in-out infinite;
  }
  @keyframes gentleWobble {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }
  .falling-item:active { transform: scale(0.88) !important; }
  .falling-item.shake-effect { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-10px) rotate(-6deg); }
    75% { transform: translateX(10px) rotate(6deg); }
  }

  .pop-effect {
    position: absolute;
    font-family: var(--font-display);
    font-size: 52px;
    font-weight: 900;
    color: var(--sun);
    pointer-events: none;
    animation: popAway 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    z-index: 200;
    text-shadow: 3px 3px 0 var(--ink);
  }
  @keyframes popAway {
    0% { transform: scale(0.5) translateY(0) rotate(-10deg); opacity: 1; }
    30% { transform: scale(1.4) translateY(-20px) rotate(5deg); opacity: 1; }
    100% { transform: scale(2.2) translateY(-100px) rotate(-8deg); opacity: 0; }
  }

  .overlay {
    position: absolute; inset: 0;
    background: rgba(42, 45, 67, 0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; padding: 20px;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--cream);
    border: 4px solid var(--ink);
    border-radius: 32px;
    padding: 36px 28px 30px;
    text-align: center;
    max-width: 520px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 92vh;
    overflow-y: auto;
    position: relative;
  }
  .modal::before {
    content: '';
    position: absolute;
    top: -4px; left: 30px; right: 30px;
    height: 6px;
    background: linear-gradient(90deg, var(--berry), var(--sun), var(--leaf), var(--sky), var(--plum));
    border-radius: 4px;
  }
  @keyframes popIn {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .modal-eyebrow {
    font-family: var(--font-body);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--berry);
    margin-bottom: 6px;
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 38px;
    font-weight: 900;
    color: var(--ink);
    margin-bottom: 12px;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .modal-text {
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 20px;
    line-height: 1.4;
    font-weight: 600;
  }
  .modal-emoji {
    font-size: 96px;
    margin: 16px 0;
    display: inline-block;
    animation: bounce 1s infinite alternate ease-in-out;
    filter: drop-shadow(3px 6px 0 rgba(42, 45, 67, 0.18));
  }
  @keyframes bounce {
    0% { transform: translateY(0) rotate(-4deg); }
    100% { transform: translateY(-14px) rotate(4deg); }
  }

  .preview-sentence {
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 18px;
    padding: 16px 18px;
    margin: 16px 0 20px;
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    line-height: 1.35;
    box-shadow: var(--shadow-sm);
  }
  .preview-sentence .target-word {
    background: rgba(255, 200, 87, 0.5);
  }

  .big-button {
    background: var(--berry);
    color: var(--cream);
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 800;
    border: 4px solid var(--ink);
    border-radius: 20px;
    padding: 16px 32px;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--ink);
    transition: transform 0.1s, box-shadow 0.1s;
    margin: 6px;
    letter-spacing: -0.01em;
  }
  .big-button:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--ink);
  }
  .big-button.start {
    background: var(--leaf);
    font-size: 28px;
    padding: 20px 40px;
  }
  .big-button.secondary {
    background: var(--cream);
    color: var(--ink);
  }
  .small-button {
    background: transparent;
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 700;
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 10px 20px;
    cursor: pointer;
    margin: 4px;
    transition: background 0.15s;
  }
  .small-button:active { background: var(--ink); color: var(--cream); }

  .theme-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 20px 0;
  }
  .theme-card {
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 20px;
    padding: 18px 10px 14px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 0 var(--ink);
    position: relative;
    overflow: hidden;
  }
  .theme-card:nth-child(1) { background: linear-gradient(180deg, #FFE2B0, #FFCB85); }
  .theme-card:nth-child(2) { background: linear-gradient(180deg, #A8D8EA, #FFE5A0); }
  .theme-card:nth-child(3) { background: linear-gradient(180deg, #C9E4DE, #A8D8B9); }
  .theme-card:nth-child(4) { background: linear-gradient(180deg, #FFF1D6, #FFC4B0); }
  .theme-card:nth-child(5) { background: linear-gradient(180deg, #C9B6E4, #FFD4DD); }
  .theme-card:nth-child(6) { background: linear-gradient(180deg, #FFD4B5, #FFF1B0); }
  .theme-card:nth-child(7) { background: linear-gradient(180deg, #B5D9A8, #D4E8B0); }
  .theme-card:nth-child(8) { background: linear-gradient(180deg, #B5DDF1, #C8E6B5); }
  .theme-card:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--ink);
  }
  .theme-card-emoji {
    font-size: 56px;
    line-height: 1;
    filter: drop-shadow(2px 4px 0 rgba(42, 45, 67, 0.15));
  }
  .theme-card-name {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 800;
    color: var(--ink);
    margin-top: 8px;
    letter-spacing: -0.01em;
  }

  .friends-display {
    background: var(--cream);
    border: 3px dashed var(--ink);
    border-radius: 18px;
    padding: 12px;
    margin-top: 16px;
  }
  .friends-display-label {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--plum);
    margin-bottom: 6px;
  }
  .friends-row {
    font-size: 36px;
    letter-spacing: 4px;
    line-height: 1;
  }

  @media (max-width: 500px) {
    .top-bar { padding: 14px 14px 16px; }
    .stat-pill { font-size: 15px; padding: 6px 12px; }
    .stat-pill .icon { font-size: 18px; }
    .sentence { font-size: 22px; }
    .sentence-card { padding: 14px 16px; border-radius: 20px; }
    .falling-item { font-size: 92px; }
    .modal-title { font-size: 30px; }
    .modal-text { font-size: 17px; }
    .modal { padding: 28px 20px 24px; }
    .theme-card-name { font-size: 16px; }
    .theme-card-emoji { font-size: 46px; }
    .big-button { font-size: 20px; padding: 14px 24px; }
    .big-button.start { font-size: 22px; padding: 16px 28px; }
    .preview-sentence { font-size: 20px; }
  }
  @media (max-width: 380px) {
    .falling-item { font-size: 80px; }
    .sentence { font-size: 19px; }
  }
</style>
</head>

  <div id="game">

      <div class="top-row">
        <div class="stat-pill">
          <span class="icon">⭐</span>
          <span class="stars-num" id="starCount">0</span>
        </div>

          <span id="roundNum">1</span><span style="opacity:0.4;">/</span><span id="roundTotal">3</span>

      </div>
      <div class="sentence-card">
        <div class="sentence" id="sentence"></div>
      </div>
    </div>
    <div id="playArea"></div>
  </div>

<script>
// EMOJI AUDIT v2: every emoji rechecked for unambiguous match to its word

];

const FRIENDS = ['🐶','🐱','🐰','🦊','🐻','🐼','🐨','🦁','🐸','🐵'];

const state = {
  stars: 0,
  currentTheme: null, themeIndex: 0, sentenceIndex: 0,
  caught: new Set(), needed: 0, items: [],
  rafId: null, spawnTimer: null,
  friendsUnlocked: 0, completedThemes: new Set(),
  sentenceActive: false,
  generation: 0,            // increments each sentence — items from old generations are rejected
  lastSpawnedWord: null,    // for no-immediate-repeat
  recentSpawns: []          // for stronger distribution (no 3-in-a-row)
};

const playArea = document.getElementById('playArea');
const sentenceEl = document.getElementById('sentence');
const topBar = document.getElementById('topBar');

function renderSentenceInto(el, puzzle) {
  let html = puzzle.sentence;
  const sortedTargets = [...puzzle.targets].sort((a, b) => b.word.length - a.word.length);
  sortedTargets.forEach((t) => {
    const wordLower = t.word.toLowerCase();
    const caughtClass = (el === sentenceEl && state.caught.has(wordLower)) ? 'caught' : '';
    const escaped = t.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('\\b(' + escaped + ')\\b', 'i');
    html = html.replace(re, `<span class="target-word ${caughtClass}" data-word="${wordLower}">$1</span>`);
  });
  el.innerHTML = html;
}

function flashTargetWord(word) {
  const el = sentenceEl.querySelector(`[data-word="${word}"]`);
  if (!el) return;
  el.classList.add('flash');
  setTimeout(() => {
    el.classList.remove('flash');
    el.classList.add('caught');
  }, 450);
}

class FallingItem {
  constructor(word, emoji, isTarget, generation) {
    this.word = word.toLowerCase();
    this.emoji = emoji;
    this.isTarget = isTarget;
    this.generation = generation;  // tag with current generation
    this.dead = false;
    const el = document.createElement('div');
    el.className = 'falling-item';
    el.textContent = emoji;
    el.dataset.generation = generation;
    el.style.animationDelay = (Math.random() * -3) + 's';
    el.addEventListener('click', () => this.handleTap());
    el.addEventListener('touchstart', (e) => { e.preventDefault(); this.handleTap(); }, { passive: false });
    this.el = el;
    const playWidth = playArea.clientWidth;
    const itemSize = playWidth < 500 ? 100 : 130;
    this.x = itemSize/2 + Math.random() * Math.max(playWidth - itemSize - 20, 100);
    this.y = -120;
    this.speed = 0.45 + Math.random() * 0.45;
    this.sway = Math.random() * Math.PI * 2;
    this.swayAmount = 12 + Math.random() * 22;
    el.style.left = this.x + 'px';
    el.style.top = this.y + 'px';
    playArea.appendChild(el);
  }
  update() {
    if (this.dead) return false;
    // If this item is from an older generation, kill it
    if (this.generation !== state.generation) { this.remove(); return false; }
    this.y += this.speed;
    this.sway += 0.025;
    const swayX = Math.sin(this.sway) * this.swayAmount;
    this.el.style.top = this.y + 'px';
    this.el.style.left = (this.x + swayX) + 'px';
    if (this.y > playArea.clientHeight + 80) { this.remove(); return false; }
    return true;
  }
  handleTap() {
    if (this.dead) return;
    if (this.generation !== state.generation) { this.remove(); return; }
    if (this.isTarget && !state.caught.has(this.word)) {
      state.caught.add(this.word);
      state.stars++; updateStars();
      flashTargetWord(this.word);
      showPopEffect(this.x, this.y, '+1');
      this.remove();
      if (state.caught.size >= state.needed) {
        state.sentenceActive = false;
        setTimeout(() => completeSentence(), 900);
      }
    } else {
      this.el.classList.add('shake-effect');
      setTimeout(() => { if (this.el) this.el.classList.remove('shake-effect'); }, 400);
    }
  }
  remove() {
    this.dead = true;
    if (this.el && this.el.parentNode) this.el.parentNode.removeChild(this.el);
    const idx = state.items.indexOf(this);
    if (idx > -1) state.items.splice(idx, 1);
  }
}

function showPopEffect(x, y, text) {
  const pop = document.createElement('div');
  pop.className = 'pop-effect';
  pop.textContent = text;
  pop.style.left = x + 'px';
  pop.style.top = y + 'px';
  playArea.appendChild(pop);
  setTimeout(() => { if (pop.parentNode) pop.parentNode.removeChild(pop); }, 1000);
}

function gameLoop() {
  for (let i = state.items.length - 1; i >= 0; i--) {
    const item = state.items[i];
    if (item.dead) { state.items.splice(i, 1); continue; }
    item.update();
  }
  state.rafId = requestAnimationFrame(gameLoop);
}

function pickItemToSpawn() {
  const theme = state.currentTheme;
  const puzzle = theme.sentences[state.sentenceIndex];
  const uncaughtTargets = puzzle.targets.filter(t => !state.caught.has(t.word.toLowerCase()));

  // Build candidate pool: ~50% targets, ~50% distractors
  // Then reject candidates equal to last spawn (prevents 5-in-a-row)
  // And reject if 2 of the last 3 spawns were this same word

  const tryPick = () => {
    let candidate;
    if (uncaughtTargets.length > 0 && Math.random() < 0.5) {
      candidate = uncaughtTargets[Math.floor(Math.random() * uncaughtTargets.length)];
      return { ...candidate, isTarget: true };
    } else {
      const d = theme.distractors[Math.floor(Math.random() * theme.distractors.length)];
      return { ...d, isTarget: false };
    }
  };

  // Try up to 5 times to find a non-repeat
  for (let attempt = 0; attempt < 5; attempt++) {
    const c = tryPick();
    const w = c.word.toLowerCase();
    // Reject if same as last spawn
    if (w === state.lastSpawnedWord) continue;
    // Reject if it appears 2+ times in recent spawns (last 3)
    const recentCount = state.recentSpawns.filter(rw => rw === w).length;
    if (recentCount >= 2) continue;
    return c;
  }
  // If we couldn't find a non-repeat after 5 tries, just take whatever
  return tryPick();
}

function spawn() {
  if (!state.sentenceActive) return;
  const pick = pickItemToSpawn();
  const item = new FallingItem(pick.word, pick.emoji, pick.isTarget, state.generation);
  state.items.push(item);
  state.lastSpawnedWord = pick.word.toLowerCase();
  state.recentSpawns.push(pick.word.toLowerCase());
  if (state.recentSpawns.length > 3) state.recentSpawns.shift();
}

function updateStars() { document.getElementById('starCount').textContent = state.stars; }

function stopSpawning() {
  state.sentenceActive = false;
  if (state.spawnTimer) { clearInterval(state.spawnTimer); state.spawnTimer = null; }
}

function hardClearItems() {
  // Bump generation so any in-flight items are invalid
  state.generation++;
  // Mark all current items dead
  state.items.forEach(it => {
    it.dead = true;
    if (it.el && it.el.parentNode) it.el.parentNode.removeChild(it.el);
  });
  state.items = [];
  // Sweep any orphan DOM nodes
  playArea.querySelectorAll('.falling-item').forEach(n => n.remove());
  playArea.querySelectorAll('.pop-effect').forEach(n => n.remove());
  // Reset spawn history
  state.lastSpawnedWord = null;
  state.recentSpawns = [];
}

function showThemePicker() {
  stopSpawning();
  hardClearItems();
  topBar.style.display = 'none';
  document.querySelectorAll('.overlay').forEach(o => o.remove());
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'themePicker';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-eyebrow">Reading Adventure</div>
      <div class="modal-title">Word Catcher</div>
      <div class="modal-text">Pick a place to read about</div>
      <div class="theme-grid">
        ${THEMES.map((t, i) => `
          <div class="theme-card" data-idx="${i}">
            <div class="theme-card-emoji">${t.icon}</div>
            <div class="theme-card-name">${t.name}</div>
          </div>`).join('')}
      </div>
      ${state.stars > 0 || state.friendsUnlocked > 0 ? `
        <div class="friends-display">
          <div class="friends-display-label">Your Collection</div>
          <div style="display:flex; justify-content:space-around; align-items:center; gap:12px;">
            <div style="font-family: var(--font-display); font-weight: 800; font-size: 20px;">
              <span style="color: var(--berry);">${state.stars}</span> ⭐
            </div>
            ${state.friendsUnlocked > 0 ? `<div class="friends-row">${FRIENDS.slice(0, state.friendsUnlocked).join(' ')}</div>` : ''}
          </div>
        </div>
      ` : ''}
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('.theme-card').forEach(card => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.dataset.idx);
      overlay.remove();
      startTheme(idx);
    });
  });
}

function startTheme(idx) {
  state.themeIndex = idx;
  state.currentTheme = THEMES[idx];
  state.sentenceIndex = 0;
  document.body.className = state.currentTheme.bodyClass;
  topBar.style.display = 'block';
  document.getElementById('themeBadge').textContent = `${state.currentTheme.icon} ${state.currentTheme.name}`;
  document.getElementById('roundTotal').textContent = state.currentTheme.sentences.length;
  showReadyScreen();
}

// NEW: Ready screen with start button before each sentence
function showReadyScreen() {
  stopSpawning();
  hardClearItems();
  state.caught = new Set();
  const puzzle = state.currentTheme.sentences[state.sentenceIndex];
  state.needed = puzzle.targets.length;
  document.getElementById('roundNum').textContent = state.sentenceIndex + 1;
  renderSentenceInto(sentenceEl, puzzle);
  updateStars();

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'readyScreen';

  // Build the preview sentence with target words highlighted
  const previewEl = document.createElement('div');
  previewEl.className = 'preview-sentence';
  renderSentenceInto(previewEl, puzzle);

  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-eyebrow">Sentence ${state.sentenceIndex + 1} of ${state.currentTheme.sentences.length}</div>
      <div class="modal-title">Read this!</div>
      <div id="previewContainer"></div>
      <div class="modal-text">
        Then catch the pictures that match the <span style="background: rgba(255, 200, 87, 0.5); padding: 1px 6px; border-radius: 4px; border-bottom: 2px solid var(--sun);">yellow words</span>.
      </div>
      <button class="big-button start" id="startBtn">I'm ready! →</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('previewContainer').appendChild(previewEl);

  document.getElementById('startBtn').onclick = () => {
    overlay.remove();
    startSentence();
  };
}

function startSentence() {
  // Already cleared in showReadyScreen, but be safe
  hardClearItems();
  state.sentenceActive = true;
  state.spawnTimer = setInterval(spawn, 950);
  if (!state.rafId) gameLoop();
  // First spawn happens immediately so the kid doesn't wait
  spawn();
}

function completeSentence() {
  stopSpawning();
  hardClearItems();
  const isLastSentence = state.sentenceIndex >= state.currentTheme.sentences.length - 1;
  if (isLastSentence) completeTheme();
  else showSentenceCompleteModal();
}

function showSentenceCompleteModal() {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-eyebrow">Well Done</div>
      <div class="modal-title">Nice Reading!</div>
      <div class="modal-emoji">⭐</div>
      <div class="modal-text">Ready for the next one?</div>
      <button class="big-button" id="nextBtn">Keep going →</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('nextBtn').onclick = () => {
    overlay.remove();
    state.sentenceIndex++;
    showReadyScreen();
  };
}

function completeTheme() {
  state.completedThemes.add(state.currentTheme.id);
  let friendUnlocked = false;
  if (state.friendsUnlocked < FRIENDS.length) {
    state.friendsUnlocked++;
    friendUnlocked = true;
  }
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-eyebrow">${friendUnlocked ? 'New Friend Unlocked' : 'Round Complete'}</div>
      <div class="modal-title">${state.currentTheme.name} Done!</div>
      <div class="modal-emoji">${friendUnlocked ? FRIENDS[state.friendsUnlocked - 1] : '🏆'}</div>
      <div class="modal-text">
        ${friendUnlocked ? `You unlocked a new friend!` : `You finished all the sentences!`}
      </div>
      ${state.friendsUnlocked > 0 ? `
        <div class="friends-display">
          <div class="friends-display-label">Friends Collected</div>
          <div class="friends-row">${FRIENDS.slice(0, state.friendsUnlocked).join(' ')}</div>
        </div>
      ` : ''}
      <div style="margin-top: 18px;">
        <button class="big-button" id="newThemeBtn">Pick a new place</button>
        <br>
        <button class="small-button" id="replayBtn">Play this one again</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('newThemeBtn').onclick = () => { overlay.remove(); showThemePicker(); };
  document.getElementById('replayBtn').onclick = () => { overlay.remove(); startTheme(state.themeIndex); };
}

showThemePicker();
</script>
</body>
</html>
